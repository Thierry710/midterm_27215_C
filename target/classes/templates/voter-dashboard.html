<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-success px-4">
    <span class="navbar-brand fw-bold">🗳️ Voter Dashboard</span>
    <div class="d-flex gap-2">
        <a th:href="@{/voter/results}" class="btn btn-outline-light btn-sm">📊 Results</a>
        <a href="/logout"              class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>
<div class="container mt-4">
    <div th:if="${param.success}"     class="alert alert-success">✅ Vote cast successfully!</div>
    <div th:if="${param.alreadyVoted}" class="alert alert-warning">⚠️ You have already voted.</div>

    <div th:if="${election != null}" class="mb-3">
        <h5 class="mb-1">📋 Current Election:</h5>
        <p class="text-success fw-bold" th:text="${election.title}"></p>
    </div>
    <div th:if="${election == null}" class="alert alert-info">No active election at the moment.</div>

    <div th:if="${hasVoted}" class="alert alert-secondary">
        ✅ You have already cast your vote. Thank you for participating!
    </div>

    <div class="row g-3 mt-1">
        <div class="col-md-4" th:each="c : ${candidates}">
            <div class="card h-100 text-center shadow-sm">
                <div class="card-body">
                    <div style="font-size:2.5rem">👤</div>
                    <h5 th:text="${c.name}"></h5>
                    <form th:if="${!hasVoted}" th:action="@{/voter/vote/{id}(id=${c.id})}" method="post">
                        <button class="btn btn-success w-100">Vote</button>
                    </form>
                    <div th:if="${hasVoted}" class="text-muted small mt-2">Voting closed for you</div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(candidates)}" class="alert alert-info mt-3">
        No approved candidates yet. Check back later.
    </div>
</div>
</body>
</html>
