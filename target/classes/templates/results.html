<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Election Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">📊 Election Results</span>
    <div class="d-flex gap-2">
        <a th:href="${backUrl}" class="btn btn-outline-light btn-sm">← Back to Dashboard</a>
        <a href="/logout"       class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>
<div class="container mt-4">
    <h4 class="mb-3">📊 Live Voting Results</h4>
    <div class="row g-3">
        <div class="col-md-4" th:each="c : ${candidates}">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body">
                    <div style="font-size:2.5rem">🏆</div>
                    <h5 th:text="${c.name}"></h5>
                    <span th:if="${c.isApproved()}"  class="badge bg-success mb-2">Approved</span>
                    <span th:if="${!c.isApproved()}" class="badge bg-warning text-dark mb-2">Pending</span>
                    <h3 class="text-primary fw-bold" th:text="${c.votes} + ' vote(s)'"></h3>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(candidates)}" class="alert alert-info mt-3">
        No candidates registered yet.
    </div>
</div>
</body>
</html>
