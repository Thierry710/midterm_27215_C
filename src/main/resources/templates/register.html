<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Online Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card shadow p-4" style="width:100%;max-width:500px">
    <h4 class="text-center mb-1">📝 Create Account</h4>
    <p class="text-center text-muted small mb-4">Select your village — location resolves automatically</p>

    <div th:if="${param.error}" class="alert alert-danger">Username already exists.</div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Role</label>
            <select name="role" class="form-select" required>
                <option value="">-- Select Role --</option>
                <option value="VOTER">Voter</option>
                <option value="CANDIDATE">Candidate</option>
            </select>
        </div>

        <!--
            ✅ SUPERVISOR REQUIREMENT:
            User saves ONLY village_id.
            System automatically resolves: Village → Cell → Sector → District → Province
        -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Village</label>
            <select name="villageId" class="form-select" required>
                <option value="">-- Select Your Village --</option>
                <optgroup th:each="village : ${villages}"
                          th:label="${village.cell.sector.district.province.name}">
                    <option th:value="${village.id}"
                            th:text="${village.name} + ' (' + ${village.cell.name} + ', ' + ${village.cell.sector.name} + ', ' + ${village.cell.sector.district.name} + ')'">
                    </option>
                </optgroup>
            </select>
            <div class="form-text">
                📍 Province, District, Sector &amp; Cell are resolved automatically from your village.
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
    <hr>
    <p class="text-center mb-0">Already have an account? <a th:href="@{/login}">Login</a></p>
</div>
</body>
</html>
