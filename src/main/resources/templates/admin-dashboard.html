<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🗳️ Admin Panel</span>
    <div class="d-flex gap-2">
        <a th:href="@{/admin/results}"   class="btn btn-outline-light btn-sm">📊 Results</a>
        <a th:href="@{/admin/voters}"    class="btn btn-outline-light btn-sm">👥 Voters</a>
        <a th:href="@{/admin/locations}" class="btn btn-outline-light btn-sm">📍 Locations</a>
        <a href="/logout"                class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>
<div class="container mt-4">
    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-center border-primary">
                <div class="card-body">
                    <h2 th:text="${totalVoters}" class="text-primary fw-bold"></h2>
                    <p class="mb-0 text-muted">Total Voters</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-success">
                <div class="card-body">
                    <h2 th:text="${votedCount}" class="text-success fw-bold"></h2>
                    <p class="mb-0 text-muted">Votes Cast</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-warning">
                <div class="card-body">
                    <h2 th:text="${#lists.size(candidates)}" class="text-warning fw-bold"></h2>
                    <p class="mb-0 text-muted">Candidates</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Election -->
    <div class="card mb-4">
        <div class="card-header fw-bold">🏛️ Active Election</div>
        <div class="card-body">
            <div th:if="${election != null}">
                <h5 th:text="${election.title}" class="text-success"></h5>
                <span class="badge bg-success">Active</span>
            </div>
            <div th:if="${election == null}" class="text-muted">No active election.</div>
        </div>
    </div>

    <!-- Create Election -->
    <div class="card mb-4">
        <div class="card-header fw-bold">➕ Create Election</div>
        <div class="card-body">
            <form th:action="@{/admin/create-election}" method="post" class="d-flex gap-2">
                <input type="text" name="title" class="form-control" placeholder="Election title" required>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </div>
    </div>

    <!-- Candidate Approvals -->
    <div class="card">
        <div class="card-header fw-bold">👥 Candidate Approvals</div>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                    <tr><th>Name</th><th>Votes</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${candidates}">
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.votes}"></td>
                        <td>
                            <span th:if="${c.isApproved()}"  class="badge bg-success">Approved</span>
                            <span th:if="${!c.isApproved()}" class="badge bg-warning text-dark">Pending</span>
                        </td>
                        <td>
                            <form th:if="${!c.isApproved()}" th:action="@{/admin/approve/{id}(id=${c.id})}" method="post" style="display:inline">
                                <button class="btn btn-sm btn-success">Approve</button>
                            </form>
                            <span th:if="${c.isApproved()}" class="text-muted small">—</span>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(candidates)}" class="p-3 text-muted">No candidates yet.</div>
        </div>
    </div>
</div>
</body>
</html>
