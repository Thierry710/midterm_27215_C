<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Candidate Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-warning px-4">
    <span class="navbar-brand fw-bold text-dark">🙋 Candidate Dashboard</span>
    <div class="d-flex gap-2">
        <a th:href="@{/candidate/results}" class="btn btn-outline-dark btn-sm">📊 Results</a>
        <a href="/logout"                  class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>
<div class="container mt-4">
    <div th:if="${param.registered}"  class="alert alert-success">✅ Registered! Waiting for admin approval.</div>
    <div th:if="${param.noElection}"  class="alert alert-warning">⚠️ No active election to register for.</div>

    <div class="card mb-4">
        <div class="card-header fw-bold">👤 Your Profile</div>
        <div class="card-body">
            <p>Logged in as: <strong th:text="${username}"></strong></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header fw-bold">🏛️ Current Election</div>
        <div class="card-body">
            <div th:if="${election != null}">
                <h5 th:text="${election.title}" class="text-primary"></h5>
                <span class="badge bg-success mb-3">Active</span><br>
                <form th:action="@{/candidate/register}" method="post">
                    <button class="btn btn-warning fw-bold">Register as Candidate</button>
                </form>
            </div>
            <div th:if="${election == null}" class="text-muted">No active election at this time.</div>
        </div>
    </div>
</div>
</body>
</html>
